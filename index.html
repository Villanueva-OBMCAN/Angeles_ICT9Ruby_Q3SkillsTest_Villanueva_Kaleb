<!DOCTYPE html>
<html>
<head>

<title>Q3 Skills Test</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background-image:url(bg1.jpg);
background-size:cover;
font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
background:darkblue;
padding:15px 30px;
}

header a{
color:white;
text-decoration:none;
margin-right:20px;
}

.form-container{
background:darkblue;
border-radius:25px;
width:650px;
margin:auto;
margin-top:40px;
padding:20px;
}

label{
color:#63e0f0;
font-weight:bold;
font-size:17px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
margin-top:5px;
margin-bottom:10px;
font-size:15px;
}

.profile{
width:90px;
height:90px;
border-radius:50%;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:#555;
margin:auto;
margin-bottom:10px;
}

#instructionText{
display:none;
background:rgba(255,255,255,0.15);
padding:8px;
border-radius:5px;
margin-bottom:10px;
font-size:14px;
}

.create-btn{
background:#22b5cf;
border:none;
padding:8px;
width:100%;
border-radius:8px;
color:white;
font-size:16px;
}

.cancel-btn{
background:#d9d9d9;
border:none;
padding:7px;
width:100%;
border-radius:6px;
}

footer{
margin-top:auto;
background:blue;
text-align:center;
padding:10px;
}

a{
color:#25e3ff;
}

</style>

</head>

<body>

<header class="d-flex justify-content-between">

<div>
    <a href="#">Home</a>
    <a href="#">Fare Matrix</a>
    <a href="#">Schedule</a>
    <a href="#">Help</a>
    </div>

<div>
<a href="#">Book Now</a>
<button class="btn btn-primary btn-sm">Create Account</button>
</div>

</header>


<div class="form-container">

    <h1 style="font-size:50px;">REGISTRATION</h1>

        <p style="font-size:15px;">Please fill out with your accurate information.</p>

            <p>
            <a href="#" onclick="toggleInstructions()">↓ Instructions</a>
            </p>

<div id="instructionText">
Fill out the form completely and click <b>Create my account</b> when finished.
</div>

<div class="row">

<div class="col-md-4 text-center">

<div class="profile">
🦲
</div>

<input type="file" id="photo" class="form-control mb-2">

<button class="btn btn-info btn-sm" onclick="uploadPhoto()">Upload Photo</button>

</div>


<div class="col-md-8">

<label>First Name:</label>
<input type="text" id="fname" placeholder="Enter your first name">

<label>Last Name:</label>
<input type="text" id="lname" placeholder="Enter your last name">

<div class="row">

<div class="col">
<label>Age:</label>
<input type="number" id="age" placeholder="Enter your age">
</div>

<div class="col">
<label>Contact Number:</label>
<input type="text" id="contact" placeholder="Enter your contact number">
</div>

</div>

<label>Email:</label>
<input type="text" id="email" placeholder="Enter your email">

<label>Username:</label>
<input type="text" id="username" placeholder="Enter your username">

<label>Password:</label>
<input type="password" id="password">

<div class="form-check mb-2">

<input class="form-check-input" type="checkbox" id="agree">

<label class="form-check-label">
    <a href="https://termly.io/resources/articles/privacy-policy-vs-terms-and-conditions/" target="_blank">I Accept the Terms of Use and Privacy Policy</a>

</a>
</label>

</div>

<button class="create-btn" onclick="createAccount()">Create my account</button>

<br>
<br>

<button class="cancel-btn" onclick="cancelForm()">Cancel</button>

</div>
</div>
</div>
<br>
<br>
<footer>
Kaleb Villanueva | 9 - Ruby ©2026
</footer>


<script>

function toggleInstructions(){

let text=document.getElementById("instructionText");

if(text.style.display==="none"){
text.style.display="block";
}else{
text.style.display="none";
}

}

function uploadPhoto(){

let file=document.getElementById("photo").value;

if(file!=""){
alert("Your profile picture has been uploaded.");
}else{
alert("Please choose a file first.");
}

}
function createAccount(){

let fname=document.getElementById("fname").value;
let lname=document.getElementById("lname").value;
let username=document.getElementById("username").value;

let fullname=fname+" "+lname;

let agree=document.getElementById("agree").checked;

if(agree==true){
alert("Account created for "+fullname+" with username: "+username);
}else{
alert("Please accept the Terms of Use first.");
}

}

function cancelForm(){

document.getElementById("fname").value="";
document.getElementById("lname").value="";
document.getElementById("age").value="";
document.getElementById("contact").value="";
document.getElementById("email").value="";
document.getElementById("username").value="";
document.getElementById("password").value="";

}

</script>
</body>
</html>
